name: Bootstrap extraction lab

on:
  push:
    branches:
      - agent/json-schema-golden-fixture
    paths:
      - bootstrap/ready

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/json-schema-golden-fixture
          fetch-depth: 0

      - name: Decode project archive
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/project.tar.gz.b64.part* > /tmp/juryai-project.tar.gz.b64
          base64 --decode /tmp/juryai-project.tar.gz.b64 > /tmp/juryai-project.tar.gz
          tar -xzf /tmp/juryai-project.tar.gz -C .
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Commit generated project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add executable schema and golden fixture"
          git push origin HEAD:agent/json-schema-golden-fixture
