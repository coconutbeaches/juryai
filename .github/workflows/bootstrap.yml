name: Bootstrap extraction lab

on:
  pull_request:
    types:
      - opened
      - reopened

permissions:
  contents: write
  pull-requests: read

jobs:
  bootstrap:
    if: github.head_ref == 'agent/json-schema-golden-fixture'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/json-schema-golden-fixture
          fetch-depth: 0

      - name: Decode verified project archive
        shell: bash
        run: |
          set -euo pipefail
          cat \
            bootstrap/project.tar.gz.b64.part00 \
            bootstrap/project.tar.gz.b64.part01 \
            bootstrap/project.tar.gz.b64.part02 \
            bootstrap/project.tar.gz.b64.part03 \
            bootstrap/project.tar.gz.b64.part04x0 \
            bootstrap/project.tar.gz.b64.part04x1 \
            bootstrap/project.tar.gz.b64.part05 \
            > /tmp/juryai-project.tar.gz.b64
          echo 'f9ac65657480c4a950a118ab6c0758dd7f015f6544a2b8e12bcebee5435e249e  /tmp/juryai-project.tar.gz.b64' | sha256sum --check
          base64 --decode /tmp/juryai-project.tar.gz.b64 > /tmp/juryai-project.tar.gz
          echo '703959afbb2832be1983ddef33436692e0242e5cc9ce249fde0899fcc11017a7  /tmp/juryai-project.tar.gz' | sha256sum --check
          tar -xzf /tmp/juryai-project.tar.gz -C .

      - name: Pin audited dependencies
        shell: bash
        run: |
          set -euo pipefail
          cat > package.json <<'JSON'
          {
            "name": "juryai-extraction-lab",
            "version": "0.1.0",
            "private": true,
            "type": "module",
            "scripts": {
              "test": "vitest run",
              "typecheck": "tsc --noEmit",
              "validate:golden": "tsx src/validation/validate-case-record.ts src/fixtures/dry_run_001.golden.json",
              "format:check": "prettier --check ."
            },
            "devDependencies": {
              "@types/node": "26.1.1",
              "ajv": "8.20.0",
              "ajv-formats": "3.0.1",
              "prettier": "3.9.5",
              "tsx": "4.23.1",
              "typescript": "7.0.2",
              "vitest": "4.1.10"
            }
          }
          JSON
          npm install --ignore-scripts

      - name: Verify extraction lab
        shell: bash
        run: |
          set -euo pipefail
          npm test
          npm run typecheck
          npm run validate:golden
          npm run format:check
          npm audit --audit-level=low

      - name: Replace transport files with validated project
        shell: bash
        run: |
          set -euo pipefail
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add executable schema and golden fixture"
          git push origin HEAD:agent/json-schema-golden-fixture
