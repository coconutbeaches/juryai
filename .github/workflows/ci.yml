name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Prepare CI logs
        run: mkdir -p .ci-logs

      - name: Run tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee .ci-logs/tests.log

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee .ci-logs/typecheck.log

      - name: Validate golden fixture
        id: golden
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run validate:golden 2>&1 | tee .ci-logs/golden.log

      - name: Check formatting
        id: formatting
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run format:check 2>&1 | tee .ci-logs/formatting.log

      - name: Audit dependencies
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm audit --audit-level=low 2>&1 | tee .ci-logs/audit.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: .ci-logs
          retention-days: 7

      - name: Enforce CI result
        if: always()
        env:
          TESTS: ${{ steps.tests.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          GOLDEN: ${{ steps.golden.outcome }}
          FORMATTING: ${{ steps.formatting.outcome }}
          AUDIT: ${{ steps.audit.outcome }}
        run: |
          printf 'tests=%s\ntypecheck=%s\ngolden=%s\nformatting=%s\naudit=%s\n' \
            "$TESTS" "$TYPECHECK" "$GOLDEN" "$FORMATTING" "$AUDIT"
          test "$TESTS" = success
          test "$TYPECHECK" = success
          test "$GOLDEN" = success
          test "$FORMATTING" = success
          test "$AUDIT" = success
