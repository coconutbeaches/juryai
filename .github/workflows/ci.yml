name: Reference diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  reference-cases:
    name: Reference · ${{ matrix.case_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case_name:
          - golden timeline has no reference errors
          - golden claims and evidence links have no reference errors
          - golden damages, issues, and questions have no reference errors
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Run reference case
        run: npx --no-install vitest run src/tests/person-a-validation.test.ts -t "${{ matrix.case_name }}"
