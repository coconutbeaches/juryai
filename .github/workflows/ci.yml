name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Prepare CI logs
        run: mkdir -p .ci-logs

      - name: Run tests
        shell: bash
        run: |
          set +e
          npx --no-install vitest run --reporter=json --outputFile=.ci-logs/tests.json >/dev/null 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            node <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('.ci-logs/tests.json', 'utf8'));
          for (const file of result.testResults ?? []) {
            for (const assertion of file.assertionResults ?? []) {
              if (assertion.status !== 'failed') continue;
              console.log(`FAIL ${file.name} :: ${assertion.ancestorTitles.join(' > ')} > ${assertion.title}`);
              for (const message of assertion.failureMessages ?? []) console.log(message.slice(0, 5000));
            }
          }
          NODE
          fi
          exit "$status"

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee .ci-logs/typecheck.log

      - name: Validate golden fixture
        shell: bash
        run: |
          set -o pipefail
          npm run validate:golden 2>&1 | tee .ci-logs/golden.log

      - name: Check formatting
        shell: bash
        run: |
          set -o pipefail
          npm run format:check 2>&1 | tee .ci-logs/formatting.log

      - name: Audit dependencies
        shell: bash
        run: |
          set -o pipefail
          npm audit --audit-level=low 2>&1 | tee .ci-logs/audit.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: .ci-logs
          retention-days: 7
