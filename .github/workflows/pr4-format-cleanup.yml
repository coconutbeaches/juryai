name: PR 4 format cleanup

on:
  pull_request:
    types: [ready_for_review, synchronize, reopened]

permissions:
  contents: write

jobs:
  format:
    if: >-
      github.event.pull_request.number == 4 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/person-a-extraction-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Format and remove diagnostics
        run: |
          rm -rf .diagnostics .pr4-diagnostic-trigger
          npx --no-install prettier --write .
      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format PR 4 review fixes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
