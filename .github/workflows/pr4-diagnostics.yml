name: PR 4 diagnostics

on:
  pull_request:
    types: [ready_for_review, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.number == 4
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Capture focused failures
        shell: bash
        run: |
          set +e
          npx --no-install vitest run src/tests/person-a-validation.test.ts src/tests/person-a-evaluation.test.ts > /tmp/pr4-tests.log 2>&1
          status=$?
          mkdir -p .diagnostics
          tail -160 /tmp/pr4-tests.log > .diagnostics/pr4-focused-tests.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .diagnostics/pr4-focused-tests.txt
          git commit -m "Write temporary PR 4 diagnostics" || true
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit $status
