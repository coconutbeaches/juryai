name: Apply v0.1.2 review fixes

on:
  pull_request:
    types:
      - reopened

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.head_ref == 'agent/json-schema-golden-fixture'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/json-schema-golden-fixture
          fetch-depth: 0

      - name: Align Notion-approved v0.1.2 schema and fixture
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          old_schema_path = root / 'src/schemas/juryai-case-record-v0.1.1.schema.json'
          new_schema_path = root / 'src/schemas/juryai-case-record-v0.1.2.schema.json'

          schema = json.loads(old_schema_path.read_text())
          schema['$id'] = 'https://juryai.dev/schemas/juryai-case-record-v0.1.2.schema.json'
          schema['title'] = 'JuryAI Case Record v0.1.2'
          schema['description'] = 'Canonical machine-readable record for JuryAI v0.1.2 freelancer/client dispute extraction.'
          schema['properties']['schema_version']['const'] = '0.1.2'

          relationships = schema['$defs']['evidenceEvidenceLink']['properties']['relationship']['enum']
          if 'same_content_different_format' not in relationships:
              insert_at = relationships.index('same_event_different_capture')
              relationships.insert(insert_at, 'same_content_different_format')

          new_schema_path.write_text(json.dumps(schema, indent=2) + '\n')
          old_schema_path.unlink()

          fixture_path = root / 'src/fixtures/dry_run_001.golden.json'
          fixture = json.loads(fixture_path.read_text())
          fixture['schema_version'] = '0.1.2'
          fixture['audit']['schema_version'] = '0.1.2'
          link = next(item for item in fixture['evidence_evidence_links'] if item['link_id'] == 'ee_003')
          link['relationship'] = 'overlaps_with'
          link['explanation'] = (
              'The recordings both concern mobile behavior, but they capture different site states '
              'on different devices and dates; they are not the same event or the same content.'
          )
          fixture_path.write_text(json.dumps(fixture, indent=2, ensure_ascii=False) + '\n')

          validator_path = root / 'src/validation/validate-case-record.ts'
          validator = validator_path.read_text().replace(
              'juryai-case-record-v0.1.1.schema.json',
              'juryai-case-record-v0.1.2.schema.json',
          )
          validator_path.write_text(validator)

          readme_path = root / 'README.md'
          readme = readme_path.read_text().replace('v0.1.1', 'v0.1.2')
          readme = readme.replace(
              'juryai-case-record-v0.1.1.schema.json',
              'juryai-case-record-v0.1.2.schema.json',
          )
          readme_path.write_text(readme)

          questions_path = root / 'SCHEMA_QUESTIONS.md'
          questions = questions_path.read_text().replace(
              'converting Artifact 1 v0.1.1',
              'converting Artifact 1 v0.1.2',
          )
          addition = r'''

## 11. Evidence-to-evidence relationship vocabulary

**Question:** Artifact 1 v0.1.1 specified `same_content_different_format`, while the first executable schema silently used `same_event_different_capture` instead.

**Decision:** Artifact 1 v0.1.2 and the executable schema retain both values because they mean different things:

- `same_content_different_format` — substantively the same content represented through different formats or exports.
- `same_event_different_capture` — separate captures of the same underlying event or state at materially the same time.

Dry Run 001 link `ee_003` is `overlaps_with`, not `same_event_different_capture`, because the June 5 and June 8 recordings show different site states on different devices and dates.

**Reason:** Preserves the original vocabulary, documents the added concept, and prevents semantically inaccurate links.

## 12. Extraction-issue taxonomy and metadata

**Question:** The executable schema introduced a richer extraction-issue taxonomy and required metadata that were not present in Artifact 1 v0.1.1.

**Decision:** Artifact 1 v0.1.2 formally adopts the executable structure. Canonical extraction issues require:

- `issue_id`
- `issue_type`
- `severity`
- `description`
- `affected_object_ids`
- `resolution_status`
- `source_spans`

Canonical `issue_type` values are:

`ambiguous_date | ambiguous_scope | internal_tension | attribution_uncertain | missing_evidence | conflicting_amount | other`

Canonical severity values are `critical | major | minor`. Canonical resolution statuses are `open | clarification_requested | resolved | accepted_uncertainty`.

**Reason:** The extraction harness needs auditable severity, source traceability, and resolution state. The change is now explicit rather than a silent schema redesign.

## 13. Recommendation example stage

**Question:** The executable schema added `example_stage` to recommendation objects even though Artifact 1 v0.1.1 did not define it.

**Decision:** Artifact 1 v0.1.2 formally requires `example_stage: post_inspection` for recommendation examples. Actual case records continue to use `recommendation: null` until deliberation is eligible.

**Reason:** Prevents a post-inspection example from being mistaken for the current pre-inspection Dry Run 001 state.

## 14. Empty resolution attempts in Dry Run 001

**Question:** Why is `resolution_attempts` empty even though Alex says Maya refuses to pay?

**Decision:** A party's present dispute position is not automatically a structured resolution attempt. Dry Run 001 contains no dated, sourced pre-case offer/counteroffer exchange that can be encoded without invention, so the array remains empty.

**Reason:** Avoids manufacturing dates, offers, or negotiation events from a general refusal-to-pay statement.
'''
          if '## 11. Evidence-to-evidence relationship vocabulary' not in questions:
              questions += addition
          questions_path.write_text(questions)

          tests_path = root / 'src/tests/schema.test.ts'
          tests = tests_path.read_text()
          insertion = r'''

  it('accepts both canonical evidence relationship concepts', async () => {
    for (const relationship of [
      'same_content_different_format',
      'same_event_different_capture',
    ]) {
      const record = clone(await loadGolden());
      record.evidence_evidence_links[2].relationship = relationship;
      const result = await validateCaseRecord(record);
      expect(result.schemaErrors).toEqual([]);
      expect(result.invariantErrors).toEqual([]);
      expect(result.valid).toBe(true);
    }
  });

  it('rejects pre-v0.1.2 extraction issue enums', async () => {
    const record = clone(await loadGolden());
    record.extraction_issues[0].issue_type = 'ambiguous_reference';
    const result = await validateCaseRecord(record);
    expect(result.valid).toBe(false);
    expect(
      result.schemaErrors.some((error) => error.path === '/extraction_issues/0/issue_type'),
    ).toBe(true);
  });
'''
          if "accepts both canonical evidence relationship concepts" not in tests:
              marker = '\n});\n'
              if not tests.endswith(marker):
                  raise SystemExit('Unexpected schema.test.ts ending')
              tests = tests[:-len(marker)] + insertion + marker
          tests_path.write_text(tests)
          PY

      - name: Install and verify
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npm test
          npm run typecheck
          npm run validate:golden
          npm run format:check
          npm audit --audit-level=low

      - name: Commit reviewed v0.1.2 alignment
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/v012-ready
          rm -f .github/workflows/apply-v012-review-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align executable schema with Artifact 1 v0.1.2"
          git push origin HEAD:agent/json-schema-golden-fixture
